    - "&c&lREDE FENIX"
    - ""
    - "&cVoce foi banido!"
    - "&7Motivo: &f{reason}"
    - "&7Expira em: {time}"
    - ""
    - "&7Faca sua revisao em: &b{appeal_url}"
  appeal-url: "https://discord.gg/"
  time-permanent: "&cPermanente"
  time-never: "&cNunca (Permanente)"
  action-banned: "BANIDO"
  action-muted: "MUTADO"
